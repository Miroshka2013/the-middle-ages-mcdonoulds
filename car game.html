<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Car Facing Forward</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

        // ================= SCENE =================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // ================= CAMERA =================
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

        // ================= RENDERER =================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ================= LIGHTS =================
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // ================= FLOOR =================
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x555555 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // ================= CAR GROUP =================
        const car = new THREE.Group();
        scene.add(car);

        // ================= MATERIALS =================
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            transparent: true,
            opacity: 0.4
        });
        function track(w, h, d, x, y, z) {
            const g = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                glassMat
            );
            g.position.set(x, y, z);
            track.add(g);
        }

        track

        // ================= BODY =================
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(2.4, 1, 4.6),
            bodyMat
        );
        body.position.y = 1;
        car.add(body);

        // ================= ROOF =================
        const roof = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.9, 2.4),
            bodyMat
        );
        roof.position.set(0, 1.8, -0.3);
        car.add(roof);

        // ================= WINDOWS =================
        function glass(w, h, d, x, y, z) {
            const g = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                glassMat
            );
            g.position.set(x, y, z);
            car.add(g);
        }

        // Front windshield
        glass(1.8, 0.8, 0.1, 0, 1, 2.25);
        // Rear glass
        glass(1.8, 0.7, 0.1, 0, 1.75, 0);
        // Left / Right windows
        glass(0.1, 0.7, 2.2, -1, 1.75, -0.3);
        glass(0.1, 0.7, 2.2, 1, 1.75, 0.4);

        // ================= LIGHTS =================
        function lightBox(x, y, z, color) {
            const l = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.3, 0.2),
                new THREE.MeshStandardMaterial({ color })
            );
            l.position.set(x, y, z);
            car.add(l);
        }

        // Headlights (FRONT = +Z)
        lightBox(0.8, 1, 2.4, 0xffff00);
        lightBox(-0.8, 1, 2.4, 0xffff00);

        // Taillights
        lightBox(0.8, 1, -2.4, 0xff2222);
        lightBox(-0.8, 1, -2.4, 0xff2222);

        // ================= WHEELS (CORRECT ORIENTATION) =================
        const wheels = [];

        function createWheel(x, z) {
            const wheel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24),
                new THREE.MeshStandardMaterial({ color: 0x000000 })
            );

            // ✅ THIS is the correct orientation
            wheel.rotation.z = Math.PI / 2;

            wheel.position.set(x, 0.45, z);
            car.add(wheel);
            wheels.push(wheel);
        }

        // Front wheels
        createWheel(1.1, 1.6);
        createWheel(-1.1, 1.6);

        // Rear wheels
        createWheel(1.1, -1.6);
        createWheel(-1.1, -1.6);


        // ================= CONTROLS =================
        const keys = {};
        document.addEventListener("keydown", e => keys[e.key] = true);
        document.addEventListener("keyup", e => keys[e.key] = false);

        // ================= MOVEMENT =================
        let speed = 0;

        function updateCar() {
            if (keys["w"]) speed = Math.min(speed + 0.01, 0.25);
            if (keys["s"]) speed = Math.max(speed - 0.01, -0.15);
            if (!keys["w"] && !keys["s"]) speed *= 0.95;

            if (keys["a"]) car.rotation.y += speed * 0.05;
            if (keys["d"]) car.rotation.y -= speed * 0.05;

            // MOVE FORWARD (Z)
            car.translateZ(speed);

            // Wheel spin
            wheels.forEach(w => w.rotation.x -= speed * 2);

            // Camera follow (behind car)
            const camOffset = new THREE.Vector3(0, 4, -10).applyAxisAngle(
                new THREE.Vector3(0, 1, 0),
                car.rotation.y
            );
            camera.position.lerp(car.position.clone().add(camOffset), 0.1);
            camera.lookAt(car.position);
        }

        // ================= LOOP =================
        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            renderer.render(scene, camera);
        }
        animate();

        // ================= RESIZE =================
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>

</html>
